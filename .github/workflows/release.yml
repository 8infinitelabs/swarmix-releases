# Build the Swarmix desktop app from the PRIVATE source repo and publish the
# signed release + latest.json HERE (public), so the in-app auto-updater can
# fetch it without auth. Dispatch with the private-repo tag to build, e.g.
# `ref: v0.1.92`.
name: release
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "swarmixapp tag to build (e.g. v0.1.92)"
        required: true
jobs:
  release:
    permissions:
      contents: write
    # Windows code signing (Azure Trusted Signing) turns on only when the Azure
    # service-principal secret exists; otherwise Windows ships unsigned as before.
    # Setup + which secrets/vars to add: swarmixapp docs/windows-signing.md
    env:
      SIGN_WIN: ${{ secrets.AZURE_CLIENT_ID != '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            triple: aarch64-apple-darwin
            node_bin: node
          - os: windows-latest
            triple: x86_64-pc-windows-msvc
            node_bin: node.exe
    runs-on: ${{ matrix.os }}
    steps:
      # Check out the PRIVATE source at the requested tag via a read-only deploy key.
      - uses: actions/checkout@v4
        with:
          repository: 8infinitelabs/swarmixapp
          ref: ${{ inputs.ref }}
          ssh-key: ${{ secrets.SOURCE_DEPLOY_KEY }}

      - name: Verify the source version matches the ref
        shell: bash
        run: |
          CONF=$(grep -m1 '"version"' apps/desktop/src-tauri/tauri.conf.json | sed 's/.*"version": *"\([^"]*\)".*/\1/')
          REF="${{ inputs.ref }}"; REF="${REF#v}"
          if [ "$CONF" != "$REF" ]; then
            echo "::error::ref v$REF does not match tauri.conf.json version $CONF"; exit 1
          fi
          echo "version ok: $CONF"

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.triple }}
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Stage Node runtime as externalBin
        shell: bash
        run: |
          mkdir -p apps/desktop/src-tauri/binaries
          NODE_PATH="$(which ${{ matrix.node_bin }})"
          EXT=""
          [[ "${{ matrix.os }}" == windows-* ]] && EXT=".exe"
          cp "$NODE_PATH" "apps/desktop/src-tauri/binaries/node-${{ matrix.triple }}${EXT}"
      - name: Bundle llama-server (local AI runtime)
        shell: bash
        run: bash scripts/fetch-llama.sh

      # Windows code signing via Azure Trusted Signing. Only runs when the Azure
      # service-principal secret is set; writes a partial Tauri config that adds
      # bundle.windows.signCommand (the committed tauri.conf.json stays unsigned).
      - name: Configure Windows signing (Azure Trusted Signing)
        id: winsign
        if: matrix.os == 'windows-latest' && env.SIGN_WIN == 'true'
        shell: pwsh
        env:
          AZ_ENDPOINT: ${{ vars.AZURE_SIGN_ENDPOINT }}
          AZ_ACCOUNT: ${{ vars.AZURE_SIGN_ACCOUNT }}
          AZ_PROFILE: ${{ vars.AZURE_SIGN_PROFILE }}
        run: |
          # NOTE: trusted-signing-cli 0.11 is deprecated in favor of
          # artifact-signing-cli (same author, Azure renamed the service). It
          # still works; migrate the crate + command name when convenient.
          # Gotcha proven the hard way: AZURE_CLIENT_SECRET must be the secret
          # VALUE, not the Secret ID, or you get AADSTS7000215.
          cargo install trusted-signing-cli --locked
          $cmd = "trusted-signing-cli -e $env:AZ_ENDPOINT -a $env:AZ_ACCOUNT -c $env:AZ_PROFILE -d Swarmix %1"
          $partial = @{ bundle = @{ windows = @{ signCommand = $cmd } } } | ConvertTo-Json -Depth 10
          Set-Content -Path apps/desktop/sign.win.json -Value $partial -Encoding utf8
          "config_arg=--config sign.win.json" >> $env:GITHUB_OUTPUT
          Write-Host "Windows signing enabled: $cmd"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Azure Trusted Signing service-principal creds (used by trusted-signing-cli
          # during bundling; unused when Windows signing isn't configured).
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        with:
          projectPath: apps/desktop
          tagName: ${{ inputs.ref }}
          releaseName: "Swarmix ${{ inputs.ref }}"
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          # steps.winsign.outputs.config_arg is empty unless Windows signing ran.
          args: --target ${{ matrix.triple }} ${{ steps.winsign.outputs.config_arg }}
